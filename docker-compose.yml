services:
  postgres:
    image: postgres:16
    container_name: ${POSTGRES_CONTAINER_NAME:-tichu-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tichu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tichu_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tichu}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tichu} -d ${POSTGRES_DB:-tichu}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
